# P1-001 (MoN-7): 测试接 CI
#
# 目的：每次 push / PR 时自动跑 16 个单测，失败时阻塞合并
# 范围：仅测试 + 构建校验，不做产品功能
#
# 设计：
#   - 单一 job "test"，Node 22（与本地一致）
#   - 步骤：install → tsc --noEmit → npm run build → 跑所有 tests/*.test.ts
#   - 16 个测试串行跑（避免 port 冲突 / db 共享）
#   - puppeteer 装 chromium（server-health 等测试用）
#   - 失败立即失败，不继续
#   - 超时 15 分钟（实测本地 5 分钟，留 3x buffer）
#
# 不做：
#   - 不做缓存（npm cache）—— 简单优先，等跑通再优化
#   - 不做 matrix / 多 OS（只 ubuntu-latest，单一）
#   - 不做自动发布 / auto-tag（issue #001 的人工纪律保留）
#
# 触发：
#   - push 到 main / refactor/* 分支
#   - PR 到 main / refactor/*
#   - 手动 workflow_dispatch（可手动触发再跑一次）

name: Test

on:
  push:
    branches:
      - main
      - 'refactor/*'
  pull_request:
    branches:
      - main
      - 'refactor/*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run all tests
        env:
          # 让 Puppeteer 知道它在 CI（避免它试图 sandbox 找 Chrome）
          CI: 'true'
          # server-health.test.ts 用 4178 端口；确保没被占
          PORT: '4178'
        run: |
          set -e
          PASS=0
          FAIL=0
          for f in tests/*.test.ts; do
            echo "============================================================"
            echo "▶ $f"
            echo "============================================================"
            if npx tsx "$f"; then
              PASS=$((PASS+1))
            else
              FAIL=$((FAIL+1))
              echo "❌ FAILED: $f"
            fi
          done
          echo "============================================================"
          echo "Summary: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "❌ At least one test file failed"
            exit 1
          fi