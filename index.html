<html lang="zh-CN">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="mobile-web-app-capable" content="yes" />
    <title>白描笔记</title>
  </head>
  <body>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter"
      // caused by rogue polyfills in dependencies or browser extensions.
      try {
        var origFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return origFetch; },
          set: function(v) { console.warn('Ignored attempt to overwrite window.fetch'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
